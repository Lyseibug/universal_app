name: universal_app
description: "Universal ERP - Production Flutter Application"
publish_to: 'none'
version: 1.0.3+4

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.6.1
  # Networking
  dio: ^5.7.0
  # Local Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4
  # Version Management
  package_info_plus: ^8.1.3
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  # Connectivity
  connectivity_plus: ^6.1.1
  # Navigation
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/mock/
