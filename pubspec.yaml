name: universal_app
description: "Universal PDT WMS - Warehouse Management Flutter Application"
publish_to: 'none'
version: 1.0.8+8

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Shared Preferences
  shared_preferences: ^2.3.4

  # Navigation
  go_router: ^14.8.1

  # Connectivity
  connectivity_plus: ^6.1.1

  # App Info
  package_info_plus: ^8.1.3
  path_provider: ^2.1.5

  # Models — Immutability + JSON codegen
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Unique IDs for idempotent writes
  uuid: ^4.4.0

  # Local persistence (write queue + cached menu)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Camera barcode scanning (fallback for non-PDT devices)
  mobile_scanner: ^5.2.3

  # Typography
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/mock/
